    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,#fff8fb 0%,#fdf4f7 100%);color:var(--text)}
    button,input,select{font:inherit}
    .app{max-width:720px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 20px)}
    .hero{background:linear-gradient(135deg,#8b1e3f 0%,#b14465 100%);color:#fff;border-radius:24px;padding:18px;box-shadow:var(--shadow);position:sticky;top:0;z-index:10}
    .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .title{font-weight:800;font-size:22px;line-height:1.2;margin:0}
    .sub{font-size:12px;opacity:.9;margin-top:6px;line-height:1.5}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .btn{border:none;background:#fff;color:var(--brand);padding:12px 14px;border-radius:14px;font-weight:700;min-height:44px;cursor:pointer}
    .btn.secondary{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.28)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:10px}
    .stat .n{font-size:20px;font-weight:800}
    .stat .l{font-size:11px;opacity:.9;margin-top:2px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:14px;margin-top:14px;box-shadow:var(--shadow)}
    .section-title{font-size:16px;font-weight:800;margin:0 0 10px}
    .status{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted)}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;border:1px solid var(--line);background:#fff}
    .badge.ok{color:var(--ok);border-color:#bbe6d4;background:#f0fbf6}
    .badge.warn{color:var(--warn);border-color:#f1d1ab;background:#fff8ef}
    .filters{display:grid;gap:10px}
    .search{width:100%;min-height:46px;border-radius:14px;border:1px solid var(--line);padding:0 14px;background:#fff}
    .chips{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
    .chip{white-space:nowrap;border-radius:999px;border:1px solid var(--line);background:#fff;padding:10px 12px;font-size:13px;color:var(--text)}
    .chip.active{background:var(--brand);border-color:var(--brand);color:#fff}
    .list{display:grid;gap:12px}
    .card{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px}
    .meta{font-size:12px;color:var(--muted);line-height:1.5}
    .card h3{font-size:16px;line-height:1.5;margin:8px 0 8px}
    .card p{font-size:13px;line-height:1.7;color:#5a4956;margin:0}
    .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .tag{font-size:11px;font-weight:700;border-radius:999px;padding:5px 8px}
    .theme-公演{background:#fce8ef;color:#922047}
    .theme-スター{background:#efe9ff;color:#6137d2}
    .theme-配信・放送{background:#e9f1ff;color:#2359b8}
    .theme-商品{background:#fef2df;color:#9a5a00}
    .theme-会員・チケット{background:#ebfff4;color:#12774a}
    .theme-学校・イベント{background:#fff0fa;color:#a13d83}
    .theme-公演スケジュール{background:#f2ebff;color:#6d3fe7}
    .theme-その他{background:#f3f4f6;color:#5b6470}
    .tag.troupe{background:#f7edf2;color:#7a4d62}
    .tag.new{background:#e9fff0;color:#08814f}
    .link{display:inline-block;margin-top:12px;color:var(--brand);font-weight:800}
    .empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
    .footer{margin:18px 0 8px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6}
  </style>
</head>

    </div>
  </section>

  <section class="panel">

    <div class="filters">

    </div>
  </section>

  <section class="panel" id="pickupPanel">

  </section>

  <section class="panel">
    <h2 class="section-title">一覧</h2>
    <div class="list" id="mainList"></div>
  </section>

  <div class="footer">
    この版は完全1ファイル版です。<br>
    外部JSONやPythonは不要です。<br>
    PC版で使っていた件数感に合わせて内蔵データ件数を拡張しています。
  </div>
</div>

const CACHE_KEY = 'takarazuka_info_cache_v040_single';
const STATE = {raw: [], theme: 'ALL', troupe: 'ALL'};
const THEME_ORDER = ['ALL','公演','公演スケジュール','会員・チケット','配信・放送','スター','商品','学校・イベント','その他'];

function qs(id){ return document.getElementById(id); }
function escapeHtml(s){ return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function formatDate(s){ return s || '-'; }
function nowText(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function setBadge(el, text, cls=''){ el.textContent = text; el.className = 'badge' + (cls ? ' ' + cls : ''); }
function saveCache(data){ try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch(e) {} }
function loadCache(){ try { return JSON.parse(localStorage.getItem(CACHE_KEY) || 'null'); } catch(e) { return null; } }
function scoreItem(item){
  let score = 1;
  if (item.isNew) score += 2;
  if (item.kind === 'schedule') score += 1;
  if (['公演','公演スケジュール','会員・チケット'].includes(item.theme)) score += 1;
  return score;
}

function deepCopyData(){ return JSON.parse(JSON.stringify(EMBEDDED_DATA)); }

function applyData(data, runtimeText, sourceText, cls=''){
  STATE.raw = [...(data.items || [])].sort((a,b)=> String(b.published).localeCompare(String(a.published)));
  qs('totalCount').textContent = STATE.raw.length;
  qs('newCount').textContent = STATE.raw.filter(x=>x.isNew).length;
  qs('scheduleCount').textContent = STATE.raw.filter(x=>x.kind==='schedule').length;
  setBadge(qs('runtimeStatus'), runtimeText, cls);
  setBadge(qs('sourceStatus'), sourceText);
  setBadge(qs('updatedAtBadge'), `データ更新日: ${data.updatedAt || '-'}`);
  setBadge(qs('loadedAtBadge'), `アプリ読込時刻: ${nowText()}`);
  renderChips();
  renderLists();
}

function refreshFromEmbedded(mode){
  const data = deepCopyData();
  saveCache(data);
  applyData(
    data,
    mode === 'manual' ? '更新しました' : '起動時に読込しました',
    '取得元: このHTML内蔵データ',
    'ok'
  );
}

function renderChips(){
  const themes = Array.from(new Set(STATE.raw.map(x=>x.theme))).sort((a,b)=>THEME_ORDER.indexOf(a)-THEME_ORDER.indexOf(b));
  const troupes = ['ALL', ...Array.from(new Set(STATE.raw.flatMap(x=>x.troupes || [])))];
  qs('themeChips').innerHTML = THEME_ORDER.filter(x=>x==='ALL' || themes.includes(x)).map(x =>
    `<button class="chip ${STATE.theme===x?'active':''}" data-kind="theme" data-value="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join('');
  qs('troupeChips').innerHTML = troupes.map(x =>
    `<button class="chip ${STATE.troupe===x?'active':''}" data-kind="troupe" data-value="${escapeHtml(x)}">${escapeHtml(x)}</button>`).join('');
  document.querySelectorAll('.chip').forEach(btn => {
    btn.onclick = () => {
      if (btn.dataset.kind === 'theme') STATE.theme = btn.dataset.value;
      if (btn.dataset.kind === 'troupe') STATE.troupe = btn.dataset.value;
      renderChips();
      renderLists();
    };
  });
}

function getFilteredItems(){
  const q = qs('searchBox').value.trim().toLowerCase();
  return STATE.raw.filter(item => {
    const matchQ = !q || `${item.title} ${item.summary} ${item.source}`.toLowerCase().includes(q);
    const matchTheme = STATE.theme === 'ALL' || item.theme === STATE.theme;
    const matchTroupe = STATE.troupe === 'ALL' || (item.troupes || []).includes(STATE.troupe);
    return matchQ && matchTheme && matchTroupe;
  });
}

function cardHtml(item){
  const themeClass = `theme-${item.theme}`;
  const troupeTags = (item.troupes || []).map(x => `<span class="tag troupe">${escapeHtml(x)}</span>`).join('');
  return `
    <article class="card">
      <div class="meta">${escapeHtml(item.source)} / ${escapeHtml(formatDate(item.published))}</div>
      <h3>${escapeHtml(item.title)}</h3>
      <p>${escapeHtml(item.summary)}</p>
      <div class="tags">
        <span class="tag ${themeClass}">${escapeHtml(item.theme)}</span>
        ${troupeTags}
        ${item.isNew ? '<span class="tag new">NEW</span>' : ''}
      </div>
      <a class="link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener noreferrer">公式ページを開く</a>
    </article>`;
}

function renderLists(){
  const filtered = getFilteredItems();
  const pickup = [...filtered]
    .sort((a,b)=>scoreItem(b)-scoreItem(a) || String(b.published).localeCompare(String(a.published)))
    .slice(0,5);
  qs('pickupList').innerHTML = pickup.length ? pickup.map(cardHtml).join('') : '<div class="empty">該当する注目情報はありません。</div>';
  qs('mainList').innerHTML = filtered.length ? filtered.map(cardHtml).join('') : '<div class="empty">該当データがありません。</div>';
}

qs('refreshBtn').onclick = () => refreshFromEmbedded('manual');
qs('searchBox').addEventListener('input', renderLists);
qs('showAllBtn').onclick = () => document.querySelector('#mainList').scrollIntoView({behavior:'smooth', block:'start'});
qs('showPickupBtn').onclick = () => document.querySelector('#pickupPanel').scrollIntoView({behavior:'smooth', block:'start'});
qs('scrollTopBtn').onclick = () => window.scrollTo({top:0, behavior:'smooth'});

window.addEventListener('load', () => {
  const cached = loadCache();
  if (cached) {
    applyData(cached, '保存済みデータを表示中', '取得元: iPhone保存データ', 'warn');
    setTimeout(() => refreshFromEmbedded('auto'), 80);
  } else {
    refreshFromEmbedded('auto');
  }
});
</script>
</body>
</html>
